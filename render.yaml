# Render Blueprint — https://docs.render.com/docs/blueprint-spec
services:
  - type: web
    name: saybook-api
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash

  - type: web
    name: saybook
    runtime: static
    buildCommand: pnpm install && pnpm --filter @workspace/saybook-app run build
    staticPublishPath: ./artifacts/saybook-app/dist/public
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: saybook-api
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
