# Render Blueprint — https://docs.render.com/docs/blueprint-spec
services:
  - type: web
    name: saybook
    runtime: node
    healthCheckPath: /api/healthz
    buildCommand: pnpm install && pnpm --filter @workspace/saybook-app run build && pnpm --filter @workspace/api-server run build
    startCommand: SERVE_STATIC=true node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SERVE_STATIC
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
