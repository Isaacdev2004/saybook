kind = "web"
previewPath = "/"
title = "SAYBOOK App"
version = "1.0.0"
id = "artifacts/saybook-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20880

[services.development]
run = "pnpm --filter @workspace/saybook-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saybook-app", "run", "build" ]
publicDir = "artifacts/saybook-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20880"
BASE_PATH = "/"
